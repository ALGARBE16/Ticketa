<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soporte Técnico</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style-usuario.css" />
    <style>
      /* Estilos para modales */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1050;
      }

      .modal-content {
        background: white;
        padding: 20px;
        border-radius: 8px;
        max-width: 500px;
        width: 90%;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.25);
        position: relative;
      }

      .close {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 1.5rem;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <!-- Navegación -->
      <div class="mb-4 text-center">
        <button
          class="btn btn-primary me-2"
          onclick="mostrarSeccion('reportes')"
        >
          Crear Reporte
        </button>
        <button class="btn btn-secondary" onclick="mostrarSeccion('estado')">
          Estado de Reportes
        </button>
        <button id="btnAdminPanel" class="btn btn-dark" style="display: none">
          Volver al Panel de Administración
        </button>
      </div>

      <!-- Sección: Crear Reporte -->
      <section id="seccion-reportes">
        <div class="card shadow">
          <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Crear Nuevo Reporte</h4>
          </div>
          <div class="card-body">
            <form id="reporteForm" enctype="multipart/form-data">
              <input type="hidden" id="reporte_id" name="id" />

              <div class="mb-3">
                <label for="title" class="form-label"
                  >Título del problema</label
                >
                <input
                  type="text"
                  id="title"
                  name="title"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="description" class="form-label">Descripción</label>
                <textarea
                  id="description"
                  name="description"
                  class="form-control"
                  required
                ></textarea>
              </div>

              <div class="mb-3">
                <label for="user_name" class="form-label">Tu nombre</label>
                <input
                  type="text"
                  id="user_name"
                  name="user_name"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="area" class="form-label">Área o ubicación</label>
                <input
                  type="text"
                  id="area"
                  name="area"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="priority" class="form-label">Prioridad</label>
                <select
                  id="priority"
                  name="priority"
                  class="form-select"
                  required
                >
                  <option value="">Seleccionar prioridad</option>
                  <option value="ALTA">Alta</option>
                  <option value="MEDIA">Media</option>
                  <option value="BAJA">Baja</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="created_at" class="form-label"
                  >Fecha y hora del problema</label
                >
                <input
                  type="datetime-local"
                  id="created_at"
                  name="created_at"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="imagen" class="form-label"
                  >Adjuntar imagen (opcional)</label
                >
                <input
                  type="file"
                  name="imagen"
                  id="imagen"
                  class="form-control"
                  accept="image/*"
                />
              </div>

              <button type="submit" class="btn btn-success">
                Enviar Reporte
              </button>

              <div id="mensaje" class="respuesta mt-3"></div>
            </form>
          </div>
        </div>
      </section>

      <!-- Sección: Estado de Reportes -->
      <section id="seccion-estado" style="display: none">
        <div class="card mt-4 shadow">
          <div class="card-header bg-secondary text-white">
            <h4 class="mb-0">Estado de mis Reportes</h4>
          </div>
          <div class="card-body">
            <ul id="listaEstado" class="list-unstyled"></ul>
          </div>
        </div>
      </section>
    </div>

    <!-- Modal de Modificación -->
    <div id="modalModificar" class="modal">
      <div class="modal-content">
        <span class="close" onclick="cerrarModalModificar()">&times;</span>
        <h4 class="mb-3">Modificar Reporte</h4>
        <form id="formModificar" enctype="multipart/form-data">
          <input type="hidden" id="mod_id" name="id" />

          <div class="mb-2">
            <input
              type="text"
              id="mod_title"
              name="title"
              class="form-control"
              placeholder="Título"
              required
            />
          </div>

          <div class="mb-2">
            <textarea
              id="mod_description"
              name="description"
              class="form-control"
              placeholder="Descripción"
              required
            ></textarea>
          </div>

          <div class="mb-2">
            <input
              type="text"
              id="mod_area"
              name="area"
              class="form-control"
              placeholder="Área"
              required
            />
          </div>

          <div class="mb-2">
            <input
              type="text"
              id="mod_user_name"
              name="user_name"
              class="form-control"
              placeholder="Tu nombre"
              required
            />
          </div>

          <div class="mb-2">
            <select
              id="mod_priority"
              name="priority"
              class="form-select"
              required
            >
              <option value="ALTA">Alta</option>
              <option value="MEDIA">Media</option>
              <option value="BAJA">Baja</option>
            </select>
          </div>

          <div class="mb-2">
            <label for="mod_created_at">Fecha del problema</label>
            <input
              type="datetime-local"
              id="mod_created_at"
              name="created_at"
              class="form-control"
              required
            />
          </div>

          <div class="mb-3">
            <label for="mod_resolved_at">Fecha de resolución (opcional)</label>
            <input
              type="datetime-local"
              id="mod_resolved_at"
              name="resolved_at"
              class="form-control"
            />
          </div>

          <div class="mb-3">
            <label for="mod_imagen">Cambiar imagen (opcional)</label>
            <input
              type="file"
              id="mod_imagen"
              name="imagen"
              class="form-control"
              accept="image/*"
            />
          </div>

          <button type="submit" class="btn btn-warning">Guardar Cambios</button>
        </form>
      </div>
    </div>

    <!-- Modal de éxito -->
    <div id="modalExito" class="modal">
      <div
        class="modal-content text-center p-4 border rounded bg-white shadow"
        style="max-width: 400px"
      >
        <h5 class="mb-3">✅ Modificado con éxito</h5>
        <button
          type="button"
          class="btn btn-primary"
          onclick="document.getElementById('modalExito').style.display = 'none'"
        >
          Cerrar
        </button>
      </div>
    </div>

    <script src="js-usuario.js"></script>
  </body>
</html>
