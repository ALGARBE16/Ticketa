<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administración</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="container py-4">
    <h2 class="mb-4 fw-bold">🛠️ Panel de Administración - Soporte Técnico</h2>
    
    <div class="table-responsive">
      <table class="table align-middle">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Título</th>
            <th>Área</th>
            <th>Estado</th>
            <th>Prioridad</th>
            <th>Fecha Creación</th>
            <th>Fecha Resolución</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <!-- Ejemplo fila (estos datos vendrán de admin.js en producción) -->
          <tr>
            <td><strong>RPT-001</strong></td>
            <td>
              <div class="d-flex align-items-center">
                <img src="https://via.placeholder.com/40" class="rounded-circle me-2" />
                <span>Juan Pérez</span>
              </div>
            </td>
            <td>
              <strong>Error en sistema de pagos</strong><br/>
              <small class="text-muted">El sistema no procesa pagos con tarjetas Visa</small>
            </td>
            <td><span class="badge bg-secondary">Pagos</span></td>
            <td><span class="badge bg-danger">Pendiente</span></td>
            <td><span class="badge bg-danger">Alta</span></td>
            <td><i class="fa-regular fa-calendar-days me-1"></i>2024-01-15</td>
            <td>-</td>
            <td>
              <div class="dropdown">
                <button class="btn btn-link text-dark" data-bs-toggle="dropdown">
                  <i class="fas fa-ellipsis-v"></i>
                </button>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">Finalizar</a></li>
                  <li><a class="dropdown-item text-danger" href="#">Eliminar</a></li>
                  <li><a class="dropdown-item" href="../Detalle/detalle.html?id=1">Ver Detalle</a></li>
                </ul>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
