<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Soporte Técnico</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1>🛠️ Soporte Técnico</h1>
      <input type="text" id="login-usuario" placeholder="Usuario">
      <input type="password" id="login-pass" placeholder="Contraseña">
      <button onclick="iniciarSesion()">Iniciar sesión</button>
      <p id="login-error" class="error"></p>
    </div>
    
    <div class="login-box">
      <h1>🛠️ Crear Cuenta</h1>
      <input type="text" id="reg-usuario" placeholder="Usuario">
      <input type="password" id="reg-pass" placeholder="Contraseña">
      <button onclick="registrarse()">Registrarse</button>
      <p id="reg-msg" class="success"></p>
    </div>
  </div>
  
  <script src="login.js"></script>
</body>
</html>
