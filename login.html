<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Autenticación JWT - Ticketa</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="text-center mb-4">Ticketa - Sistema de Autenticación</h1>

      <div class="row g-4">
        <!-- Login -->
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h3 class="card-title mb-3">Iniciar Sesión</h3>
              <form id="loginForm">
                <div class="mb-3">
                  <label for="loginEmail" class="form-label">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    id="loginEmail"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="loginPassword" class="form-label"
                    >Contraseña</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="loginPassword"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  Login
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Registro -->
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h3 class="card-title mb-3">Registrarse</h3>
              <form id="registerForm">
                <div class="mb-3">
                  <label for="registerEmail" class="form-label">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    id="registerEmail"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="registerPassword" class="form-label"
                    >Contraseña</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="registerPassword"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-success w-100">
                  Registrarse
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Botones -->
      <div class="text-center mt-5">
        <button id="btnProfile" class="btn btn-info px-4 me-2">
          Ver Perfil
        </button>
        <button id="btnLogout" class="btn btn-outline-danger px-4">
          Cerrar Sesión
        </button>
      </div>

      <!-- Resultado perfil -->
      <div
        id="profileInfo"
        class="mt-4 text-center fw-bold fs-5 text-primary"
      ></div>
    </div>
    <script src="logins.js"></script>
    <script src="register.js"></script>
    <script src="profile.js"></script>
  </body>
</html>
